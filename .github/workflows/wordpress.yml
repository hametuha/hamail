name: Test Plugin

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    name: PHP Unit Test
    strategy:
      matrix:
        php: [ '7.4', '8.2' ] # PHP versions to check.
        wp: [ 'latest', '6.6' ]      # WordPress version to check.
    uses: tarosky/workflows/.github/workflows/wp-unit-test.yml@main
    with:
      php_version: ${{ matrix.php }}
      wp_version: ${{ matrix.wp }}

  lint:
    name: PHP Syntax Check
    uses: tarosky/workflows/.github/workflows/phpcs.yml@main
    with:
      version: 7.4

  php-lint:
    name: PHP Syntax Check for Plugin Directory
    uses: tarosky/workflows/.github/workflows/phplint.yml@main
    with:
      php_versions: '["7.4", "8.2"]'

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.1
          tools: composer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: composer install --no-progress

      - name: Run PHPStan
        run: composer phpstan

  assets:
    name: Check JS and CSS syntax
    uses: tarosky/workflows/.github/workflows/npm.yml@main
    with:
      node_version: 20
      command: lint
      package: package

  status-check:
    name: Status Check
    if: always()
    runs-on: ubuntu-latest
    needs: [ test, lint, php-lint, phpstan, assets ]
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
